<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Cat Engine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#000000;--bg1:#080808;--bg2:#111111;--bg3:#181818;--bg4:#222222;
  --acc1:#ffffff;--acc2:#ffffff;--acc3:#ffffff;--acc4:#cccccc;
  --txt1:#ffffff;--txt2:#cccccc;--txt3:#888888;
  --brd:#ffffff;--brd2:#cccccc;
  --ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--info:#cccccc;
  --font:'JetBrains Mono',monospace;
}
body{background:var(--bg0);color:var(--txt1);font-family:var(--font);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
input,select,textarea,button{font-family:var(--font);font-size:12px;background:var(--bg2);color:var(--txt1);border:1px solid var(--brd);border-radius:3px;padding:4px 8px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc1)}
button{cursor:pointer;padding:5px 12px;transition:all .15s}
button:hover{background:var(--bg3);border-color:var(--acc1)}
button.primary{background:#ffffff;border-color:#ffffff;color:#000000}
button.primary:hover{background:#cccccc;border-color:#cccccc;color:#000000}
button.danger{background:#000000;border-color:var(--err);color:var(--err)}
button.danger:hover{background:#1a0000}
button.small{padding:2px 8px;font-size:11px}
select{cursor:pointer}
label{color:var(--txt2);font-size:11px;display:block;margin-bottom:3px}
.field{margin-bottom:10px}
.field label{margin-bottom:3px}
.field input,.field select,.field textarea{width:100%}
.tag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:bold}
.tag-pipe{background:#000;color:#fff;border:1px solid #fff}
.tag-event{background:#000;color:#fff;border:1px solid #fff}
.tag-view{background:#000;color:#fff;border:1px solid #fff}
.tag-in{background:#000;color:#fff;border:1px solid #fff}
.tag-out{background:#000;color:#888;border:1px solid #888}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{height:48px;background:var(--bg1);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;z-index:100}
.logo-img{height:36px;width:auto;object-fit:contain;display:block;flex-shrink:0}
#project-name-input{background:transparent;border:none;font-size:14px;color:var(--txt1);flex:1;min-width:0;font-family:var(--font)}
#project-name-input:focus{background:var(--bg2);border-radius:3px;padding:2px 6px}
.header-actions{display:flex;gap:8px;margin-left:auto;flex-shrink:0}
#main-layout{display:flex;flex:1;overflow:hidden}
#left-panel{width:280px;min-width:280px;background:var(--bg1);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.panel-tabs{display:flex;border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap}
.tab-btn{flex:1;padding:8px 4px;font-size:10px;border:none;background:transparent;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-align:center;font-family:var(--font)}
.tab-btn:hover{color:var(--txt2);background:var(--bg2)}
.tab-btn.active{color:var(--acc1);border-bottom-color:var(--acc1);background:var(--bg2)}
.panel-content{flex:1;overflow-y:auto;overflow-x:hidden}
.tab-panel{display:none;padding:12px}
.tab-panel.active{display:block}
.panel-section{margin-bottom:16px;padding:10px;background:var(--bg2);border-radius:4px;border:1px solid var(--brd)}
.panel-section h4{color:var(--acc1);font-size:11px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.item-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
.list-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg3);border-radius:3px;border:1px solid var(--brd);cursor:pointer;transition:all .15s}
.list-item:hover{border-color:var(--acc1);background:var(--bg4)}
.list-item.selected{border-color:var(--acc1);background:var(--bg4)}
.list-item-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item-actions{display:flex;gap:4px;flex-shrink:0}
#center-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#canvas-toolbar{height:40px;background:var(--bg1);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.canvas-tab-btn{padding:4px 12px;font-size:11px;border:1px solid var(--brd);background:transparent;color:var(--txt2);cursor:pointer;border-radius:3px;font-family:var(--font)}
.canvas-tab-btn.active{background:var(--bg3);color:var(--acc1);border-color:var(--acc1)}
#canvas-views{flex:1;overflow:hidden;position:relative}
#canvas-view{display:none;height:100%;flex-direction:column}
#canvas-view.active{display:flex}
#dom-view{display:none;height:100%;overflow-y:auto;padding:12px;background:var(--bg0)}
#dom-view.active{display:block}
#preview-view{display:none;height:100%;overflow:auto;background:#fff}
#preview-view.active{display:block}
#canvas{flex:1;overflow:auto;background:var(--bg0);position:relative;padding:16px}
#canvas-drop{min-height:100%;border:2px dashed var(--brd);border-radius:4px;position:relative;min-height:400px;transition:border-color .2s}
#canvas-drop.drag-over{border-color:var(--acc1)}
.m-wrapper{position:relative;margin:4px;border:1px dashed transparent;transition:all .15s;cursor:pointer}
.m-wrapper:hover{border-color:var(--acc3)!important}
.m-wrapper.selected{border-color:var(--acc1)!important;border-style:solid}
.m-label{position:absolute;top:-18px;left:0;font-size:9px;color:var(--acc1);background:var(--bg0);padding:1px 4px;border-radius:2px;white-space:nowrap;pointer-events:none;display:none}
.m-wrapper.selected .m-label{display:block}
#right-panel{width:300px;min-width:300px;background:var(--bg1);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
#right-panel .panel-tabs{flex-wrap:nowrap}
#inspector-content{flex:1;overflow-y:auto;padding:12px}
.inspector-section{margin-bottom:12px;padding:10px;background:var(--bg2);border-radius:4px;border:1px solid var(--brd)}
.inspector-section h4{color:var(--acc1);font-size:11px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
#log-panel{height:180px;min-height:180px;background:var(--bg1);border-top:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0}
#log-header{display:flex;align-items:center;padding:4px 12px;border-bottom:1px solid var(--brd);gap:8px}
#log-header span{color:var(--txt2);font-size:11px;text-transform:uppercase;letter-spacing:1px}
#log-output{flex:1;overflow-y:auto;padding:8px 12px;font-size:11px;line-height:1.6}
.log-entry{display:flex;gap:8px;padding:1px 0;border-bottom:1px solid #1a1a1a}
.log-time{color:var(--txt3);flex-shrink:0}
.log-level{flex-shrink:0;width:40px}
.log-level.info{color:var(--info)}
.log-level.warn{color:var(--warn)}
.log-level.error{color:var(--err)}
.log-level.ok{color:var(--ok)}
.log-msg{color:var(--txt1);word-break:break-all}
.dom-node{display:flex;align-items:center;gap:4px;padding:3px 0;cursor:pointer;white-space:nowrap;border-radius:3px;padding:3px 6px}
.dom-node:hover{background:var(--bg3)}
.dom-node.selected{background:var(--bg4);border-left:2px solid var(--acc1)}
.dom-indent{display:inline-block;width:16px;flex-shrink:0}
.dom-tag{color:var(--acc3);font-size:11px}
.dom-name{color:var(--txt2);font-size:11px;margin-left:4px}
.dom-children{border-left:1px solid var(--brd);margin-left:8px}
.empty-state{color:var(--txt3);text-align:center;padding:20px;font-size:12px}
.logic-block{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;margin-bottom:6px;overflow:hidden}
.logic-block-header{padding:6px 10px;background:var(--bg4);display:flex;align-items:center;gap:8px;cursor:pointer}
.logic-block-body{padding:10px;display:none}
.logic-block.open .logic-block-body{display:block}
.logic-type{font-weight:bold;font-size:11px}
.tag-method{display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px;font-weight:bold;font-family:monospace;flex-shrink:0}
.tag-get{background:#000;color:#888;border:1px solid #555}
.tag-post{background:#fff;color:#000;border:1px solid #fff}
.tag-put{background:#000;color:#ccc;border:1px solid #888}
.tag-delete{background:#000;color:#666;border:1px solid #444}
.api-route{display:flex;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--bg3)}
.logic-if .logic-type{color:var(--info)}
.logic-elseif .logic-type{color:var(--warn)}
.logic-else .logic-type{color:var(--ok)}
.event-wire{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bg3);border-radius:3px;border:1px solid var(--brd);margin-bottom:4px}
.event-wire-arrow{color:var(--acc1);font-size:14px}
.css-prop-row{display:flex;gap:4px;margin-bottom:4px;align-items:center}
.css-prop-row input{flex:1}
.css-group{margin-bottom:12px}
.css-group-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:6px}
.css-token{font-family:monospace;font-size:10px;padding:3px 8px 3px 6px;border-radius:4px;border:1px solid var(--brd);background:transparent;color:var(--txt3);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin:0 3px 3px 0;white-space:nowrap;line-height:1.5}
.css-token:hover{border-color:var(--acc1);color:var(--txt2)}
.css-token.css-token-active{border-color:var(--acc1);background:rgba(168,85,247,0.12);color:var(--txt1)}
.css-token-dot{width:5px;height:5px;border-radius:50%;background:var(--brd);flex-shrink:0;transition:background .15s}
.css-token.css-token-active .css-token-dot{background:var(--acc1)}
.css-enum-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.css-enum-label{font-size:10px;font-family:monospace;color:var(--txt3);white-space:nowrap;min-width:92px;flex-shrink:0}
.css-val{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--brd);background:transparent;color:var(--txt3);cursor:pointer;font-family:monospace;line-height:1.5}
.css-val:hover{border-color:var(--acc1);color:var(--txt2)}
.css-val.active{background:var(--acc1);border-color:var(--acc1);color:#fff}
.css-val.remove{border-color:transparent;color:var(--brd2);padding:2px 5px}
.css-val.remove:hover{color:#f55;border-color:transparent;background:transparent}
.pipe-schema-row{display:flex;gap:4px;margin-bottom:4px;align-items:center}
.pipe-schema-row input{flex:1}
.db-table{width:100%;border-collapse:collapse;font-size:11px}
.db-table th{background:var(--bg4);color:var(--acc1);padding:4px 8px;text-align:left;border:1px solid var(--brd)}
.db-table td{padding:4px 8px;border:1px solid var(--brd);color:var(--txt1);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.db-table tr:nth-child(even) td{background:#0d0d0d}
.resizer{width:4px;cursor:col-resize;background:var(--brd);flex-shrink:0;transition:background .15s}
.resizer:hover{background:var(--acc1)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--brd2);border-radius:6px;padding:20px;min-width:400px;max-width:600px;max-height:80vh;overflow-y:auto}
.modal h3{color:var(--acc1);margin-bottom:16px;font-size:15px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;background:var(--bg4);color:var(--txt2);border:1px solid var(--brd)}
.canvas-machine-placeholder{color:var(--txt3);font-size:12px;padding:8px;border:1px dashed var(--brd);border-radius:3px;min-width:40px;min-height:24px;display:inline-block;margin:2px}
.add-child-btn{display:block;width:100%;padding:4px;background:transparent;border:1px dashed var(--brd);color:var(--txt3);border-radius:3px;cursor:pointer;font-size:11px;margin-top:4px;font-family:var(--font)}
.add-child-btn:hover{border-color:var(--acc1);color:var(--acc1)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--acc2)}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <img src="https://magiccatsoftware.ca/MCENGINELOGO.png" alt="Magic Cat Engine" class="logo-img">
    <input id="project-name-input" value="Untitled Project" title="Click to rename project">
    <div class="header-actions">
      <select id="runtime-style-select" class="small" title="Runtime style">
        <option value="mono">Mono Black</option>
        <option value="graphite">Graphite Steel</option>
        <option value="paper">Paper Light</option>
        <option value="ocean">Ocean Console</option>
        <option value="forest">Forest Lab</option>
        <option value="ember">Ember Night</option>
      </select>
      <button class="small" onclick="UI.applyRuntimeStyle(document.getElementById('runtime-style-select').value)">Apply Style</button>
      <button class="small" onclick="UI.exportJSON()">Export JSON</button>
      <button class="small" onclick="UI.exportHTML()">Export HTML</button>
      <button class="small" onclick="UI.importJSON()">Import JSON</button>
      <button class="small primary" onclick="UI.runPreview()">&#9654; Run Preview</button>
      <button class="small" onclick="UI.replicateSelf()">&#x2728; Replicate Self</button>
    </div>
  </div>
  <div id="main-layout">
    <div id="left-panel">
      <div class="panel-tabs">
        <button class="tab-btn active" data-tab="db" onclick="UI.switchLeftTab('db')">DB</button>
        <button class="tab-btn" data-tab="events" onclick="UI.switchLeftTab('events')">Events</button>
        <button class="tab-btn" data-tab="pipes" onclick="UI.switchLeftTab('pipes')">Pipes</button>
        <button class="tab-btn" data-tab="views" onclick="UI.switchLeftTab('views')">Views</button>
        <button class="tab-btn" data-tab="css" onclick="UI.switchLeftTab('css')">CSS</button>
        <button class="tab-btn" data-tab="logic" onclick="UI.switchLeftTab('logic')">Logic</button>
        <button class="tab-btn" data-tab="loops" onclick="UI.switchLeftTab('loops')">Loops</button>
        <button class="tab-btn" data-tab="vars" onclick="UI.switchLeftTab('vars')">Vars</button>
      </div>
      <div class="panel-content">
        <div class="tab-panel active" id="tab-db"><div id="db-panel-content"></div></div>
        <div class="tab-panel" id="tab-events"><div id="events-panel-content"></div></div>
        <div class="tab-panel" id="tab-pipes"><div id="pipes-panel-content"></div></div>
        <div class="tab-panel" id="tab-views"><div id="views-panel-content"></div></div>
        <div class="tab-panel" id="tab-css"><div id="css-panel-content"></div></div>
        <div class="tab-panel" id="tab-logic"><div id="logic-panel-content"></div></div>
        <div class="tab-panel" id="tab-loops"><div id="loops-panel-content"></div></div>
        <div class="tab-panel" id="tab-vars"><div id="vars-panel-content"></div></div>
      </div>
    </div>
    <div id="center-panel">
      <div id="canvas-toolbar">
        <button class="canvas-tab-btn active" onclick="UI.switchCanvasTab('canvas')">Canvas</button>
        <button class="canvas-tab-btn" onclick="UI.switchCanvasTab('dom')">DOM Tree</button>
        <button class="canvas-tab-btn" onclick="UI.switchCanvasTab('preview')">Preview</button>
        <div id="view-switcher-wrap" style="margin-left:8px;display:flex;align-items:center;gap:5px;border-left:1px solid var(--bg3);padding-left:10px">
          <span style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px">View:</span>
          <select id="canvas-view-select" onchange="ViewSystem.activate(this.value||null)" style="font-size:11px;padding:2px 5px;background:var(--bg2);color:var(--txt1);border:1px solid var(--bg3);border-radius:3px;max-width:100px">
            <option value="">— all —</option>
          </select>
        </div>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          <span style="color:var(--txt3);font-size:11px">Add Machine:</span>
          <select id="add-tag-select">
            <option>div</option><option>section</option><option>article</option>
            <option>header</option><option>footer</option><option>nav</option>
            <option>button</option><option>input</option><option>textarea</option>
            <option>select</option><option>p</option><option>h1</option>
            <option>h2</option><option>h3</option><option>span</option>
            <option>a</option><option>img</option><option>ul</option>
            <option>li</option><option>table</option><option>form</option>
            <option>label</option>
          </select>
          <button class="small primary" onclick="UI.addMachine()">+ Machine</button>
          <button class="small" onclick="UI.addChildMachine()" title="Add child to selected">+ Child</button>
          <button class="small danger" onclick="UI.deleteMachine()">&#x2715; Delete</button>
        </div>
      </div>
      <div id="canvas-views">
        <div id="canvas-view" class="active">
          <div id="canvas">
            <div id="canvas-drop"></div>
          </div>
        </div>
        <div id="dom-view"><div id="dom-tree-inner"></div></div>
        <div id="preview-view"><iframe id="preview-frame" style="width:100%;height:100%;border:none"></iframe></div>
      </div>
    </div>
    <div id="right-panel">
      <div class="panel-tabs">
        <button class="tab-btn active" data-itab="props" onclick="UI.switchInspectorTab('props')">Props</button>
        <button class="tab-btn" data-itab="wire" onclick="UI.switchInspectorTab('wire')">Wire</button>
        <button class="tab-btn" data-itab="data" onclick="UI.switchInspectorTab('data')">Data</button>
      </div>
      <div id="inspector-content"></div>
    </div>
  </div>
  <div id="log-panel">
    <div id="log-header">
      <span>&#x1F4DC; Log</span>
      <button class="small" onclick="Logger.clear()">Clear</button>
      <button class="small" onclick="Logger.toggle()">Toggle</button>
      <div id="log-stats" style="margin-left:auto;color:var(--txt3);font-size:10px"></div>
    </div>
    <div id="log-output"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="UI.closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
'use strict';

// ============================================================
// GLOBAL STATE
// ============================================================
const MCE = {
  version: '1.0.0',
  project: { name: 'Untitled Project' },
  machines: {},
  rootOrder: [],
  events: {},
  pipes: {},
  views: {},
  loops: {},
  vars: {},
  css: {},
  logic: {},
  runtimeStyle: 'mono',
  selectedId: null,
  inspectorTab: 'props',
  leftTab: 'db',
  canvasTab: 'canvas',
  _nextId: 1,
  newId() { return 'M' + (this._nextId++); },
  allNames() {
    const e = Object.keys(this.events);
    const p = Object.keys(this.pipes);
    const v = Object.keys(this.views);
    const l = Object.keys(this.loops);
    return new Set([...e, ...p, ...v, ...l]);
  },
};

// ============================================================
// DATABASE (in-memory, clears on refresh)
// ============================================================
const DB = {
  _store: {},
  _nextDocId: 1,
  createCollection(name, isArray = true) {
    if (this._store[name]) return Logger.warn(`DB: collection "${name}" already exists`);
    this._store[name] = { isArray, docs: isArray ? [] : null, single: isArray ? null : {} };
    Logger.ok(`DB: collection "${name}" created (${isArray ? 'array' : 'single'})`);
    UI.renderDB();
  },
  dropCollection(name) {
    if (!this._store[name]) return;
    delete this._store[name];
    Logger.warn(`DB: collection "${name}" dropped`);
    UI.renderDB();
  },
  insert(collName, doc) {
    const coll = this._store[collName];
    if (!coll) return Logger.error(`DB: collection "${collName}" not found`);
    const record = { _id: this._nextDocId++, ...doc, _created: Date.now() };
    if (coll.isArray) {
      coll.docs.push(record);
    } else {
      coll.single = record;
    }
    Logger.ok(`DB: inserted into "${collName}"`);
    EventBus.emit('db:change', { collection: collName, op: 'insert', doc: record });
    UI.renderDB();
    return record;
  },
  find(collName, query = {}) {
    const coll = this._store[collName];
    if (!coll) return [];
    const src = coll.isArray ? coll.docs : (coll.single ? [coll.single] : []);
    return src.filter(doc => {
      if (query.q !== undefined && query.q !== '') {
        const term = String(query.q).toLowerCase();
        if (!Object.values(doc).some(v => String(v).toLowerCase().includes(term))) return false;
      }
      return Object.keys(query).filter(k => k !== 'q').every(k => doc[k] === query[k]);
    });
  },
  findOne(collName, query = {}) {
    const res = this.find(collName, query);
    return res[0] || null;
  },
  update(collName, query, update) {
    const coll = this._store[collName];
    if (!coll) return 0;
    let count = 0;
    if (coll.isArray) {
      coll.docs = coll.docs.map(doc => {
        if (Object.keys(query).every(k => doc[k] === query[k])) {
          count++;
          return { ...doc, ...update, _updated: Date.now() };
        }
        return doc;
      });
    } else if (coll.single) {
      coll.single = { ...coll.single, ...update, _updated: Date.now() };
      count = 1;
    }
    if (count > 0) {
      Logger.ok(`DB: updated ${count} in "${collName}"`);
      EventBus.emit('db:change', { collection: collName, op: 'update' });
      UI.renderDB();
    }
    return count;
  },
  remove(collName, query) {
    const coll = this._store[collName];
    if (!coll) return 0;
    const before = coll.isArray ? coll.docs.length : 1;
    if (coll.isArray) {
      coll.docs = coll.docs.filter(doc => !Object.keys(query).every(k => doc[k] === query[k]));
    } else {
      coll.single = {};
    }
    const removed = before - (coll.isArray ? coll.docs.length : 0);
    if (removed > 0) {
      Logger.ok(`DB: removed ${removed} from "${collName}"`);
      EventBus.emit('db:change', { collection: collName, op: 'remove' });
      UI.renderDB();
    }
    return removed;
  },
  clear(collName) {
    const coll = this._store[collName];
    if (!coll) return;
    if (coll.isArray) coll.docs = [];
    else coll.single = {};
    Logger.warn(`DB: cleared "${collName}"`);
    EventBus.emit('db:change', { collection: collName, op: 'clear' });
    UI.renderDB();
  },
  getCollections() { return Object.keys(this._store); },
  getCollection(name) { return this._store[name] || null; },
  getStats() {
    const names = Object.keys(this._store);
    let total = 0;
    names.forEach(n => {
      const c = this._store[n];
      if (c.isArray) total += c.docs.length;
      else if (c.single && c.single._id) total++;
    });
    return { collections: names.length, documents: total };
  },
};

// ============================================================
// EVENT BUS
// ============================================================
const EventBus = {
  _listeners: {},
  emit(name, payload = {}) {
    Logger.info(`EVENT: "${name}" fired`, payload);
    const ls = this._listeners[name] || [];
    ls.forEach(cb => { try { cb(payload); } catch(e) { Logger.error(`Event handler error: ${e.message}`); } });
    // Trigger machine wires
    Object.values(MCE.machines).forEach(m => {
      if (!m.wires) return;
      m.wires.forEach(w => {
        if (w.eventName === name) {
          MachineSystem.executeAction(w.targetId || m.id, w.action, payload, w.actionArgs);
        }
      });
    });
  },
  on(name, cb) {
    if (!this._listeners[name]) this._listeners[name] = [];
    this._listeners[name].push(cb);
  },
  off(name, cb) {
    if (!this._listeners[name]) return;
    this._listeners[name] = this._listeners[name].filter(x => x !== cb);
  },
};

// ============================================================
// PIPE SYSTEM
// ============================================================
// ============================================================
// MOCK API — HTTP middleware between Pipes and DB
// ============================================================
const MockAPI = {
  _endpoints: {},

  register(method, path, handler) {
    this._endpoints[`${method} ${path}`] = handler;
  },

  async request(method, path, body = {}, query = {}) {
    const key = `${method} ${path}`;
    const handler = this._endpoints[key];
    if (!handler) {
      Logger.error(`[MockAPI] 404 — ${method} ${path}`);
      return { status: 404, error: `No endpoint: ${method} ${path}` };
    }
    const pipe = Object.values(MCE.pipes).find(p => p.endpoint === path && p.method === method);
    const delay = pipe ? (pipe.delay || 0) : 0;
    if (delay > 0) await new Promise(r => setTimeout(r, delay));
    try {
      const data = handler({ body, query });
      Logger.ok(`[MockAPI] ${method} ${path} → 200`);
      return { status: 200, data };
    } catch(e) {
      Logger.error(`[MockAPI] ${method} ${path} → 500: ${e.message}`);
      return { status: 500, error: e.message };
    }
  },

  registerPipeEndpoints(pipe) {
    if (!pipe.collection || !pipe.endpoint || !pipe.method) return;
    const { collection: coll, endpoint: path, method } = pipe;
    this.register(method, path, ({ body, query }) => {
      if (method === 'GET') {
        const c = DB.getCollection(coll);
        return c ? (c.isArray ? DB.find(coll, query) : DB.findOne(coll, query)) : null;
      }
      if (method === 'POST') return DB.insert(coll, body);
      if (method === 'PUT') { DB.update(coll, query, body); return { updated: true }; }
      if (method === 'DELETE') { const n = DB.remove(coll, query); return { deleted: n }; }
    });
  },

  getEndpoints() {
    return Object.keys(this._endpoints).map(k => {
      const sp = k.indexOf(' ');
      return { method: k.slice(0, sp), path: k.slice(sp + 1) };
    });
  },
};

// ============================================================
// PIPE SYSTEM — named connections from machines to Mock API
// ============================================================
const PipeSystem = {
  create(name, config) {
    if (MCE.allNames().has(name)) { Logger.error(`Name "${name}" already in use`); return false; }
    const method = config.method || (config.direction === 'out' ? 'GET' : 'POST');
    const endpoint = config.endpoint || `/api/${config.collection || name}`;
    MCE.pipes[name] = {
      name, method, endpoint,
      collection: config.collection || '',
      schema: config.schema || [],
      description: config.description || '',
      delay: config.delay !== undefined ? config.delay : 300,
    };
    MockAPI.registerPipeEndpoints(MCE.pipes[name]);
    Logger.ok(`Pipe "${name}" → ${method} ${endpoint}`);
    UI.renderPipes();
    return true;
  },
  delete(name) { delete MCE.pipes[name]; UI.renderPipes(); Logger.warn(`Pipe "${name}" deleted`); },
  execute(name, data) {
    const pipe = MCE.pipes[name];
    if (!pipe) return Logger.error(`Pipe "${name}" not found`);
    if (pipe.method === 'GET') return Logger.error(`Pipe "${name}" is a GET pipe — use PipeSystem.fetch()`);
    Logger.info(`[API] ${pipe.method} ${pipe.endpoint}`);
    return MockAPI.request(pipe.method, pipe.endpoint, data).then(response => {
      if (response.status === 200) {
        EventBus.emit(`pipe:${name}:written`, { pipe: name, data: response.data, response });
        this._applyToBindings(name, response.data);
      }
      return response;
    });
  },
  fetch(name, query = {}) {
    const pipe = MCE.pipes[name];
    if (!pipe) return Logger.error(`Pipe "${name}" not found`);
    if (pipe.method !== 'GET') return Logger.error(`Pipe "${name}" is not a GET pipe — use PipeSystem.execute()`);
    Logger.info(`[API] GET ${pipe.endpoint}`);
    return MockAPI.request('GET', pipe.endpoint, {}, query).then(response => {
      if (response.status === 200) {
        EventBus.emit(`pipe:${name}:fetched`, { pipe: name, data: response.data, response });
        this._applyToBindings(name, response.data);
      }
      return response;
    });
  },
  _applyToBindings(pipeName, data) {
    Object.values(MCE.machines).forEach(m => {
      (m.pipeBindings || []).forEach(pb => {
        if (pb.pipeName !== pipeName) return;
        const el = document.getElementById('mw_' + m.id);
        const inner = el ? el.querySelector('[data-machine-inner]') : null;
        const target = inner || el;
        if (!target) return;
        const rendered = Array.isArray(data)
          ? data.map(d => JSON.stringify(d)).join('\n')
          : (data !== null && typeof data === 'object' ? JSON.stringify(data, null, 2) : String(data ?? ''));
        const it = m.inputTransform;
        const val = (it && it.filter) ? FilterSystem.apply(rendered, it.filter, it.arg || undefined) : rendered;
        if (pb.target === 'innerHTML') target.innerHTML = val;
        else if (pb.target === 'textContent') target.textContent = val;
        else if (pb.target === 'value') target.value = val;
        else if (pb.target === 'src') target.src = val;
        else if (pb.target === 'href') target.href = val;
        m.text = val;
        Logger.info(`Pipe binding: ${pipeName} → ${m.name}.${pb.target}`);
      });
    });
    LoopSystem.renderAll(pipeName, data);
  },
};

// ============================================================
// VIEW SYSTEM
// ============================================================
const ViewSystem = {
  _active: null,
  _params: {},

  create(name, configOrTemplate = '', descArg = '') {
    if (MCE.allNames().has(name)) { Logger.error(`Name "${name}" already in use`); return false; }
    const config = typeof configOrTemplate === 'string'
      ? { description: descArg || configOrTemplate }
      : configOrTemplate;
    MCE.views[name] = { name, title: config.title || name, description: config.description || '', params: Array.isArray(config.params) ? config.params : [] };
    Logger.ok(`View "${name}" created — URL: ?view=${name}`);
    UI.renderViews();
    return true;
  },
  delete(name) {
    delete MCE.views[name];
    if (this._active === name) { this._active = null; this.activate(null); }
    UI.renderViews();
    Logger.warn(`View "${name}" deleted`);
  },
  update(name, config) {
    if (!MCE.views[name]) return;
    if (typeof config === 'string') MCE.views[name].description = config;
    else Object.assign(MCE.views[name], config);
    Logger.ok(`View "${name}" updated`); UI.renderViews();
  },

  // Canvas editor: show/hide machines based on viewBinding
  activate(viewName) {
    this._active = viewName || null;
    this._params = {};
    const active = this._active;
    Object.values(MCE.machines).forEach(m => {
      const el = document.getElementById('mw_' + m.id);
      if (!el) return;
      if (!m.viewBinding) return; // null = always visible
      const bound = String(m.viewBinding).split(',').map(s => s.trim()).filter(Boolean);
      el.style.display = (!active || bound.includes(active)) ? '' : 'none';
    });
    Logger.ok(`[View] Canvas: "${viewName || 'all views'}"`);
    EventBus.emit('view:activated', { view: viewName });
    UI.renderViews();
    UI.renderInspector();
  },

  // Canvas editor: simulate URL navigation + fire events
  navigate(viewName, params = {}) {
    this._active = viewName;
    this._params = { ...params };
    this.activate(viewName);
    const qs = new URLSearchParams({ view: viewName, ...params }).toString();
    Logger.info(`[View] → ?${qs}`);
    EventBus.emit(`view:${viewName}`, params);
    EventBus.emit('view:changed', { view: viewName, params });
  },

  getParam(key) { return this._params[key] || null; },
  getParams() { return { view: this._active, ...this._params }; },
};

// ============================================================
// FILTER SYSTEM — transform template values: {{field | FILTER}} or {{field | FILTER:arg}}
// ============================================================
const FilterSystem = {
  filters: {
    UPPER:    v     => v.toUpperCase(),
    LOWER:    v     => v.toLowerCase(),
    TITLE:    v     => v.replace(/\b\w/g, c => c.toUpperCase()),
    TRIM:     v     => v.trim(),
    REVERSE:  v     => v.split('').reverse().join(''),
    SLUG:     v     => v.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, ''),
    INITIALS: v     => v.trim().split(/\s+/).map(w => w[0]?.toUpperCase() || '').join(''),
    FIRST:    v     => v.trim().split(/\s+/)[0] || v,
    LAST:     v     => { const p = v.trim().split(/\s+/); return p[p.length - 1] || v; },
    BOOL:     v     => v === 'true' || v === '1' || v === 'yes' ? 'Yes' : 'No',
    NUMBER:   v     => { const n = parseFloat(v); return isNaN(n) ? v : n.toLocaleString(); },
    CURRENCY: v     => { const n = parseFloat(v); return isNaN(n) ? v : '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); },
    PERCENT:  v     => v + '%',
    ROUND:    v     => { const n = parseFloat(v); return isNaN(n) ? v : String(Math.round(n)); },
    ABS:      v     => { const n = parseFloat(v); return isNaN(n) ? v : String(Math.abs(n)); },
    DATE:     v     => { const d = new Date(v); return isNaN(d) ? v : d.toLocaleDateString(); },
    TRUNCATE: (v,a) => { const n = parseInt(a) || 50; return v.length > n ? v.slice(0, n) + '…' : v; },
    DEFAULT:  (v,a) => v.trim() ? v : (a || '—'),
  },
  apply(value, name, arg) {
    const fn = this.filters[name];
    if (!fn) return value;
    try { return fn(value, arg); } catch(e) { return value; }
  },
};

const FILTER_NAMES = Object.keys(FilterSystem.filters);

// ============================================================
// LOOP SYSTEM — iterate pipe output, render per-document templates
// ============================================================
const LoopSystem = {
  create(name, config) {
    if (MCE.allNames().has(name)) { Logger.error(`Name "${name}" already in use`); return null; }
    MCE.loops[name] = {
      name,
      pipeName: config.pipeName || '',
      template: config.template || '',
      targetId: config.targetId || null,
      description: config.description || '',
    };
    Logger.ok(`Loop "${name}" created (source: ${config.pipeName})`);
    UI.renderLoops();
    return MCE.loops[name];
  },
  delete(name) {
    delete MCE.loops[name];
    UI.renderLoops();
    Logger.warn(`Loop "${name}" deleted`);
  },
  render(name, data) {
    const loop = MCE.loops[name];
    if (!loop) return Logger.error(`Loop "${name}" not found`);
    const records = Array.isArray(data) ? data : (data !== null && data !== undefined ? [data] : []);
    const html = records.map((doc, idx) => {
      let t = loop.template;
      const vals = {};
      Object.keys(doc).forEach(k => { vals[k] = doc[k] !== null && doc[k] !== undefined ? String(doc[k]) : ''; });
      vals['_index'] = String(idx + 1);
      vals['_total'] = String(records.length);
      t = t.replace(/\{\{([^}]+)\}\}/g, (_, inner) => {
        const pipe = inner.indexOf('|');
        let key, filter, arg;
        if (pipe !== -1) {
          key = inner.slice(0, pipe).trim();
          const rest = inner.slice(pipe + 1).trim();
          const colon = rest.indexOf(':');
          filter = colon !== -1 ? rest.slice(0, colon).trim() : rest;
          arg    = colon !== -1 ? rest.slice(colon + 1)       : undefined;
        } else { key = inner.trim(); }
        const raw = Object.prototype.hasOwnProperty.call(vals, key) ? vals[key] : (() => { const gv = MCE.vars[key]; return gv !== undefined ? String(gv && typeof gv === 'object' ? (gv.value || '') : gv) : ''; })();
        return filter ? FilterSystem.apply(raw, filter, arg) : raw;
      });
      return t;
    }).join('');
    if (loop.targetId && MCE.machines[loop.targetId]) {
      MCE.machines[loop.targetId].text = html;
      const el = document.getElementById('mw_' + loop.targetId);
      const inner = el ? el.querySelector('[data-machine-inner]') : null;
      if (inner || el) (inner || el).innerHTML = html;
    }
    Logger.ok(`Loop "${name}" rendered ${records.length} document${records.length !== 1 ? 's' : ''}`);
    EventBus.emit(`loop:${name}:rendered`, { loop: name, count: records.length, data: records });
  },
  renderAll(pipeName, data) {
    Object.values(MCE.loops).forEach(loop => {
      if (loop.pipeName === pipeName) this.render(loop.name, data);
    });
  },
};

// ============================================================
// MACHINE SYSTEM
// ============================================================
const MachineSystem = {
  create(tag, parentId = null, name = null) {
    const id = MCE.newId();
    const machine = {
      id, tag: tag || 'div',
      name: name || `${tag}_${id}`,
      attrs: {},
      text: '',
      children: [],
      parentId,
      wires: [],
      pipeBindings: [],
      viewBinding: null,
      css: {},
      dbSource: null,
      emitOnInput: '',
      emitOnClick: '',
      transferOnClick: { fromId: '', eventName: '' },
      inputTransform:  { filter: '', arg: '' },
      outputTransform: { filter: '', arg: '' },
    };
    MCE.machines[id] = machine;
    if (parentId && MCE.machines[parentId]) {
      MCE.machines[parentId].children.push(id);
    } else {
      MCE.rootOrder.push(id);
    }
    if (!MCE.logic[id]) MCE.logic[id] = { blocks: [] };
    if (DB._store['_machines']) {
      DB.insert('_machines', { _machineId: id, name: machine.name, tag: machine.tag, text: '', css: {}, attrs: {} });
    }
    Logger.ok(`Machine "${machine.name}" <${tag}> created`);
    EventBus.emit('machine:created', { id, tag, name: machine.name });
    UI.renderCanvas();
    UI.renderDOMTree();
    this.select(id);
    return machine;
  },
  select(id) {
    MCE.selectedId = id;
    document.querySelectorAll('.m-wrapper').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById('mw_' + id);
    if (el) el.classList.add('selected');
    document.querySelectorAll('.dom-node').forEach(el => el.classList.remove('selected'));
    const dn = document.getElementById('dn_' + id);
    if (dn) dn.classList.add('selected');
    UI.renderInspector();
    UI.renderLogicPanel();
    UI.renderCSSPanel();
    Logger.info(`Selected: ${id} (${MCE.machines[id]?.name || 'unknown'})`);
  },
  flatOrder() {
    const ids = [];
    const walk = id => { if (!MCE.machines[id]) return; ids.push(id); MCE.machines[id].children.forEach(walk); };
    MCE.rootOrder.forEach(id => { if (!MCE.machines[id]?.parentId) walk(id); });
    return ids;
  },
  delete(id) {
    const m = MCE.machines[id];
    if (!m) return;
    // Delete children recursively
    [...m.children].forEach(cid => this.delete(cid));
    // Remove from parent
    if (m.parentId && MCE.machines[m.parentId]) {
      MCE.machines[m.parentId].children = MCE.machines[m.parentId].children.filter(c => c !== id);
    } else {
      MCE.rootOrder = MCE.rootOrder.filter(x => x !== id);
    }
    if (DB._store['_machines']) DB.remove('_machines', { _machineId: id });
    delete MCE.machines[id];
    delete MCE.logic[id];
    delete MCE.css[id];
    if (MCE.selectedId === id) { MCE.selectedId = null; UI.renderInspector(); }
    Logger.warn(`Machine "${m.name}" deleted`);
    EventBus.emit('machine:deleted', { id });
    UI.renderCanvas();
    UI.renderDOMTree();
  },
  update(id, key, value) {
    if (!MCE.machines[id]) return;
    MCE.machines[id][key] = value;
    UI.renderCanvas();
    UI.renderDOMTree();
  },
  setAttr(id, attr, value) {
    if (!MCE.machines[id]) return;
    if (value === '') delete MCE.machines[id].attrs[attr];
    else MCE.machines[id].attrs[attr] = value;
    UI.renderCanvas();
  },
  setCSSProp(id, prop, value) {
    if (!MCE.machines[id]) return;
    if (!MCE.machines[id].css) MCE.machines[id].css = {};
    if (value === '') delete MCE.machines[id].css[prop];
    else MCE.machines[id].css[prop] = value;
    UI.applyLiveCSS(id);
  },
  addWire(id, eventName, action, actionArgs = '', targetId = '') {
    if (!MCE.machines[id]) return;
    MCE.machines[id].wires.push({ eventName, targetId, action, actionArgs });
    Logger.ok(`Wire: "${eventName}" → ${action} on ${MCE.machines[id].name}`);
    UI.renderInspector();
  },
  removeWire(id, idx) {
    if (!MCE.machines[id]) return;
    MCE.machines[id].wires.splice(idx, 1);
    UI.renderInspector();
  },
  addPipeBinding(id, pipeName, target = 'innerHTML') {
    if (!MCE.machines[id]) return;
    MCE.machines[id].pipeBindings.push({ pipeName, target });
    Logger.ok(`Pipe binding: "${pipeName}" → ${target} on ${MCE.machines[id].name}`);
    UI.renderInspector();
  },
  removePipeBinding(id, idx) {
    if (!MCE.machines[id]) return;
    MCE.machines[id].pipeBindings.splice(idx, 1);
    UI.renderInspector();
  },
  _actionConfig(args) {
    if (!args) return {};
    if (typeof args === 'object') return args;
    try { return JSON.parse(args); } catch(e) { Logger.error('Action config JSON: ' + e.message); return {}; }
  },
  _findRuntimeEl(ref) {
    if (!ref) return null;
    const byDomId = document.getElementById(ref);
    if (byDomId) return byDomId;
    const byExportId = document.querySelector(`[data-mce-id="${ref}"]`);
    if (byExportId) return byExportId;
    const wrap = document.getElementById('mw_' + ref);
    return wrap ? (wrap.querySelector('[data-machine-inner]') || wrap) : null;
  },
  _fieldValue(ref) {
    const el = this._findRuntimeEl(ref);
    if (!el) return '';
    return ('value' in el) ? el.value : el.textContent;
  },
  _setFieldValue(ref, value) {
    const el = this._findRuntimeEl(ref);
    if (!el) return;
    if ('value' in el) el.value = value;
    else el.textContent = value;
  },
  _renderPreviewAction(args) {
    const cfg = this._actionConfig(args);
    const html = this._fieldValue(cfg.html);
    const css = this._fieldValue(cfg.css);
    const targets = Array.isArray(cfg.targets) ? cfg.targets : [cfg.target].filter(Boolean);
    targets.forEach(ref => {
      const el = this._findRuntimeEl(ref);
      if (!el) return;
      el.innerHTML = '';
      const st = document.createElement('style');
      st.textContent = css;
      const box = document.createElement('div');
      box.innerHTML = html;
      el.appendChild(st);
      el.appendChild(box);
    });
    if (cfg.log) this._setFieldValue(cfg.log, 'Preview rendered at ' + new Date().toLocaleTimeString());
  },
  _appendValueAction(args) {
    const cfg = this._actionConfig(args);
    const el = this._findRuntimeEl(cfg.field);
    if (!el) return;
    const current = ('value' in el) ? el.value : el.textContent;
    const next = current + (cfg.value || '');
    if ('value' in el) el.value = next; else el.textContent = next;
    if (cfg.log) this._setFieldValue(cfg.log, cfg.message || 'Value appended');
    if (cfg.render) this._renderPreviewAction(cfg.render);
  },
  _downloadTextAction(args, asJSON) {
    const cfg = this._actionConfig(args);
    let output = '';
    if (asJSON) {
      const fields = cfg.fields || {};
      const state = { version: '1.0.0', project: { name: cfg.projectName || 'Child IDE Project' }, exportedAt: new Date().toISOString() };
      Object.entries(fields).forEach(([key, ref]) => { state[key] = this._fieldValue(ref); });
      output = JSON.stringify(state, null, 2);
    } else {
      const html = this._fieldValue(cfg.html);
      const css = this._fieldValue(cfg.css);
      output = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>' + (cfg.title || 'Child IDE Export') + '</title>\n<style>' + css + '</style>\n</head>\n<body>\n' + html + '\n</body>\n</html>';
    }
    const a = document.createElement('a');
    a.href = 'data:' + (asJSON ? 'application/json' : 'text/html') + ';charset=utf-8,' + encodeURIComponent(output);
    a.download = cfg.filename || (asJSON ? 'project.json' : 'export.html');
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => a.remove(), 1000);
    if (cfg.log) this._setFieldValue(cfg.log, asJSON ? 'Downloading JSON...' : 'Downloading HTML...');
  },
  _syncJSONAction(args) {
    const cfg = this._actionConfig(args);
    const fields = cfg.fields || {};
    const state = { version: '1.0.0', project: { name: cfg.projectName || 'Child IDE Project' }, updatedAt: new Date().toISOString() };
    Object.entries(fields).forEach(([key, ref]) => { state[key] = this._fieldValue(ref); });
    this._setFieldValue(cfg.target, JSON.stringify(state, null, 2));
    if (cfg.log) this._setFieldValue(cfg.log, 'JSON state synchronized');
  },
  _importJSONAction(args) {
    const cfg = this._actionConfig(args);
    try {
      const state = JSON.parse(this._fieldValue(cfg.source) || '{}');
      Object.entries(cfg.fields || {}).forEach(([key, ref]) => {
        if (state[key] !== undefined) this._setFieldValue(ref, state[key]);
      });
      if (cfg.log) this._setFieldValue(cfg.log, 'JSON imported from state panel');
      if (cfg.render) this._renderPreviewAction(cfg.render);
    } catch(e) {
      if (cfg.log) this._setFieldValue(cfg.log, 'Import error: ' + e.message);
    }
  },
  _clearFieldsAction(args) {
    const cfg = this._actionConfig(args);
    (cfg.fields || []).forEach(ref => this._setFieldValue(ref, ref === cfg.json ? '{}' : ''));
    (cfg.targets || []).forEach(ref => {
      const el = this._findRuntimeEl(ref);
      if (el) el.innerHTML = '';
    });
    if (cfg.log) this._setFieldValue(cfg.log, 'Project cleared');
  },
  executeAction(id, action, payload = {}, args = '') {
    if (args && typeof args === 'string') {
      args = args.replace(/\{\{THIS\.VALUE\}\}/g, String(payload.value !== undefined ? payload.value : (payload.text !== undefined ? payload.text : '')));
      if (args.indexOf('{{') !== -1) {
        Object.entries(MCE.vars || {}).forEach(([k, v]) => {
          const val = (v && typeof v === 'object') ? String(v.value || '') : String(v || '');
          args = args.split('{{' + k + '}}').join(val);
        });
      }
    }
    const el = document.getElementById('mw_' + id);
    const inner = el ? el.querySelector('[data-machine-inner]') : null;
    const target = inner || el;
    if (!target) return;
    switch (action) {
      case 'show': target.style.display = ''; break;
      case 'hide': target.style.display = 'none'; break;
      case 'toggle': target.style.display = target.style.display === 'none' ? '' : 'none'; break;
      case 'fadeIn': target.style.opacity = '0'; target.style.transition = 'opacity .4s'; setTimeout(() => target.style.opacity = '1', 10); break;
      case 'fadeOut': target.style.transition = 'opacity .4s'; target.style.opacity = '0'; break;
      case 'fadeToBlack': document.body.style.transition = 'background .5s'; document.body.style.background = '#000'; break;
      case 'addClass': target.classList.add(...args.split(' ').filter(Boolean)); break;
      case 'removeClass': target.classList.remove(...args.split(' ').filter(Boolean)); break;
      case 'toggleClass': target.classList.toggle(args.trim()); break;
      case 'setText': if (inner) { const it = MCE.machines[id]?.inputTransform; const raw = args || payload.text || payload.value || ''; inner.textContent = (it && it.filter) ? FilterSystem.apply(raw, it.filter, it.arg || undefined) : raw; } break;
      case 'setHTML': if (inner) { const it = MCE.machines[id]?.inputTransform; const raw = args || payload.html || ''; inner.innerHTML = (it && it.filter) ? FilterSystem.apply(raw, it.filter, it.arg || undefined) : raw; } break;
      case 'setValue': if (inner) { const it = MCE.machines[id]?.inputTransform; const raw = args || payload.value || ''; inner.value = (it && it.filter) ? FilterSystem.apply(raw, it.filter, it.arg || undefined) : raw; } break;
      case 'emit': EventBus.emit(args, payload); break;
      case 'navigate': ViewSystem.navigate(args, payload); break;
      case 'pipeIn': PipeSystem.execute(args, payload); break;
      case 'pipeOut': PipeSystem.fetch(args); break;
      case 'log': Logger.info(`[${MCE.machines[id]?.name}] ${args || JSON.stringify(payload)}`); break;
      case 'dbPull': this.dbPull(id); break;
      case 'dbPush': this.dbPush(id); break;
      case 'loopRender': if (args) { const loop = MCE.loops[args]; if (loop && loop.pipeName) PipeSystem.fetch(loop.pipeName, payload); else if (loop) LoopSystem.render(args, []); } break;
      case 'renderPreview': this._renderPreviewAction(args); break;
      case 'appendValue': this._appendValueAction(args); break;
      case 'exportHTMLFromFields': this._downloadTextAction(args, false); break;
      case 'exportJSONFromFields': this._downloadTextAction(args, true); break;
      case 'syncJSONFromFields': this._syncJSONAction(args); break;
      case 'importJSONToFields': this._importJSONAction(args); break;
      case 'clearFields': this._clearFieldsAction(args); break;
    }
    Logger.info(`Action "${action}" on ${MCE.machines[id]?.name}`);
  },
  dbPush(id) {
    const m = MCE.machines[id];
    if (!m) return;
    if (!DB._store['_machines']) return Logger.warn('_machines collection not found');
    const existing = DB.findOne('_machines', { _machineId: id });
    const doc = { name: m.name, tag: m.tag, text: m.text, css: { ...m.css }, attrs: { ...m.attrs } };
    if (existing) {
      DB.update('_machines', { _machineId: id }, doc);
    } else {
      DB.insert('_machines', { _machineId: id, ...doc });
    }
    Logger.ok(`Machine "${m.name}" pushed to DB`);
    UI.renderInspector();
  },
  dbPull(id) {
    const m = MCE.machines[id];
    if (!m) return;
    if (m.dbSource && m.dbSource.collection) {
      const src = DB.getCollection(m.dbSource.collection);
      if (src) {
        const docs = src.isArray ? src.docs : (src.single ? [src.single] : []);
        const doc = docs[0] || null;
        if (doc && m.dbSource.field && doc[m.dbSource.field] !== undefined) {
          m.text = String(doc[m.dbSource.field]);
          UI.renderCanvas();
          UI.renderInspector();
          Logger.ok(`Machine "${m.name}" pulled "${m.dbSource.field}" from "${m.dbSource.collection}"`);
          return;
        }
      }
      Logger.warn(`dbPull: no matching doc/field in "${m.dbSource.collection}"`);
      return;
    }
    if (!DB._store['_machines']) return Logger.warn('_machines collection not found');
    const doc = DB.findOne('_machines', { _machineId: id });
    if (!doc) return Logger.warn(`No DB doc for machine "${m.name}" — push first`);
    if (doc.text !== undefined && doc.text !== '') m.text = doc.text;
    if (doc.css && typeof doc.css === 'object') Object.assign(m.css, doc.css);
    if (doc.attrs && typeof doc.attrs === 'object') Object.assign(m.attrs, doc.attrs);
    UI.renderCanvas();
    UI.renderInspector();
    Logger.ok(`Machine "${m.name}" pulled from _machines`);
  },
  setDbSource(id, key, value) {
    const m = MCE.machines[id];
    if (!m) return;
    if (!m.dbSource) m.dbSource = { collection: '', field: '' };
    m.dbSource[key] = value;
    if (!m.dbSource.collection && !m.dbSource.field) m.dbSource = null;
    UI.renderInspector();
  },
  executeLogic(id, context = {}) {
    const logic = MCE.logic[id];
    if (!logic || !logic.blocks.length) return;
    this._executeBlockChain(logic.blocks, context, id);
  },
  _executeBlockChain(blocks, context, id) {
    for (const block of blocks) {
      let pass = false;
      if (block.type === 'if' || block.type === 'elseif') {
        try { pass = !!eval(`(function(ctx, DB, EventBus, PipeSystem, ViewSystem){ return ${block.condition}; })(context, DB, EventBus, PipeSystem, ViewSystem)`); }
        catch(e) { Logger.error(`Logic condition: ${e.message}`); }
      } else if (block.type === 'else') { pass = true; }
      if (pass) {
        if (block.code) {
          try { eval(`(function(ctx, DB, EventBus, PipeSystem, ViewSystem, machine){ ${block.code} })(context, DB, EventBus, PipeSystem, ViewSystem, MCE.machines['${id}'])`); }
          catch(e) { Logger.error(`Logic code: ${e.message}`); }
        }
        if (block.children && block.children.length) this._executeBlockChain(block.children, context, id);
        break;
      }
    }
  },
  buildHTML(id, forExport = false) {
    const m = MCE.machines[id];
    if (!m) return '';
    const emitAttr = m.emitOnInput ? ` oninput="EventBus.emit('${m.emitOnInput}',{value:this.value})"` : '';
    const emitClickAttr = m.emitOnClick ? ` onclick="EventBus.emit('${m.emitOnClick}',{})"` : '';
    const toc = m.transferOnClick;
    const transferAttr = (toc && toc.fromId && toc.eventName)
      ? ` onclick="(function(){var s=document.querySelector('[data-mce-id=${toc.fromId}]');if(!s){var w=document.getElementById('mw_${toc.fromId}');s=w?w.querySelector('[data-machine-inner]'):null;}var v=s?(s.tagName==='INPUT'||s.tagName==='TEXTAREA'?s.value:s.textContent)||'':'';EventBus.emit('${toc.eventName}',{value:v});})();"` : '';
    const attrs = emitClickAttr + Object.entries(m.attrs).map(([k,v]) => ` ${k}="${v}"`).join('') + emitAttr + transferAttr;
    // View-bound machines start hidden in export; ViewSystem reveals the correct ones on load
    const baseCss = Object.entries(m.css || {}).map(([k,v]) => `${k}:${v}`).join(';');
    const cssStr = (forExport && m.viewBinding) ? ('display:none;' + baseCss.replace(/display:[^;]+;?/g,'')) : baseCss;
    const styleAttr = cssStr ? ` style="${cssStr}"` : '';
    const exportAttr = forExport ? ` data-mce-id="${id}"` : '';
    const viewAttr  = (forExport && m.viewBinding) ? ` data-view="${m.viewBinding}"` : '';
    const selfClosing = ['input','img','br','hr'].includes(m.tag);
    const childrenHTML = m.children.map(cid => this.buildHTML(cid, forExport)).join('');
    if (selfClosing) return `<${m.tag}${exportAttr}${viewAttr}${attrs}${styleAttr}>`;
    const rawText = m.text || '';
    let displayText = rawText;
    if (forExport && rawText.indexOf('{{') !== -1) {
      Object.entries(MCE.vars || {}).forEach(([k, v]) => {
        const val = (v && typeof v === 'object') ? String(v.value || '') : String(v || '');
        displayText = displayText.split('{{' + k + '}}').join(val);
      });
    }
    return `<${m.tag}${exportAttr}${viewAttr}${attrs}${styleAttr}>${displayText}${childrenHTML}</${m.tag}>`;
  },
};

// ============================================================
const Logger = {
  _entries: [],
  _collapsed: false,
  _counts: { info: 0, warn: 0, error: 0, ok: 0 },
  _log(level, msg, data) {
    const entry = { level, msg: typeof msg === 'string' ? msg : JSON.stringify(msg), data, time: new Date().toLocaleTimeString() };
    this._entries.unshift(entry);
    if (this._entries.length > 200) this._entries.pop();
    this._counts[level] = (this._counts[level] || 0) + 1;
    this._render(entry);
    this._updateStats();
  },
  info(msg, data) { this._log('info', msg, data); },
  warn(msg, data) { this._log('warn', msg, data); },
  error(msg, data) { this._log('error', msg, data); },
  ok(msg, data) { this._log('ok', msg, data); },
  _render(entry) {
    const out = document.getElementById('log-output');
    if (!out) return;
    const row = document.createElement('div');
    row.className = 'log-entry';
    row.innerHTML = `<span class="log-time">${entry.time}</span><span class="log-level ${entry.level}">${entry.level.toUpperCase()}</span><span class="log-msg">${entry.msg}</span>`;
    out.prepend(row);
  },
  _updateStats() {
    const el = document.getElementById('log-stats');
    if (el) el.textContent = `${this._counts.ok || 0} ok | ${this._counts.warn || 0} warn | ${this._counts.error || 0} err`;
  },
  clear() { this._entries = []; this._counts = { info: 0, warn: 0, error: 0, ok: 0 }; const out = document.getElementById('log-output'); if (out) out.innerHTML = ''; this._updateStats(); },
  toggle() {
    this._collapsed = !this._collapsed;
    const lp = document.getElementById('log-panel');
    if (lp) lp.style.height = this._collapsed ? '32px' : '180px';
  },
};

  _createCollection() {
    const name = document.getElementById('db-coll-name').value.trim();

    DB.createCollection(name, isArr);

  },
  _viewCollection(name) {
    const el = document.getElementById('db-collection-view');
    const c = DB.getCollection(name);
    if (!c || !el) return;
    const docs = c.isArray ? c.docs : (c.single ? [c.single] : []);
    if (!docs.length) { el.innerHTML = `<div class="panel-section"><h4>${name}</h4><div class="empty-state">Empty</div></div>`; return; }
    const keys = [...new Set(docs.flatMap(d => Object.keys(d)))];
    let html = `<div class="panel-section"><h4>${name} <button class="small danger" onclick="DB.clear('${name}')">Clear All</button></h4>

  _insertModal(collName) {
    const c = DB.getCollection(collName);

  _addSchemaRow() {
    const rows = document.getElementById('pipe-schema-rows');
    if (!rows) return;
    const row = document.createElement('div');
    row.className = 'pipe-schema-row';
    row.style.cssText = 'display:flex;gap:4px;margin-bottom:4px';
    row.innerHTML = `<input placeholder="field name" class="schema-key" style="flex:1"><select class="schema-type"><option>text</option><option>number</option><option>boolean</option><option>date</option></select><button class="small danger" onclick="this.parentElement.remove()">&#x2715;</button>`;
    rows.appendChild(row);
  },
  _updatePipeEndpointHint() {
    const coll = document.getElementById('pipe-coll').value;
    const ep = document.getElementById('pipe-endpoint');
    if (ep && coll && (!ep.value || ep.value.startsWith('/api/'))) ep.value = '/api/' + coll;
  },
  _createPipe() {
    const name = document.getElementById('pipe-name').value.trim();
    const method = document.getElementById('pipe-method').value;
    const coll = document.getElementById('pipe-coll').value;
    const endpoint = document.getElementById('pipe-endpoint').value.trim() || `/api/${coll || name}`;
    const delay = parseInt(document.getElementById('pipe-delay').value) || 300;
    const desc = document.getElementById('pipe-desc').value.trim();
    if (!name) return Logger.error('Pipe name required');
    const schema = [];
    document.querySelectorAll('.pipe-schema-row').forEach(row => {
      const key = row.querySelector('.schema-key').value.trim();
      const type = row.querySelector('.schema-type').value;
      if (key) schema.push({ key, type });
    });
    PipeSystem.create(name, { method, endpoint, collection: coll, delay, schema, description: desc });
    document.getElementById('pipe-name').value = '';
    document.getElementById('pipe-desc').value = '';
    document.getElementById('pipe-endpoint').value = '';
    document.getElementById('pipe-schema-rows').innerHTML = '';
  },
  _testPipe(name) {
    const p = MCE.pipes[name];
    if (!p) return;
    const isRead = p.method === 'GET';
    const bodyPlaceholder = JSON.stringify(Object.fromEntries((p.schema||[]).map(s => [s.key, ''])), null, 2);
    this.openModal(`
      <h3 style="margin-bottom:4px;font-size:14px">${p.method} ${p.endpoint}</h3>
      <p style="color:var(--txt3);font-size:11px;margin-bottom:12px">${p.name} · ${p.collection||'no collection'} · ${p.delay||0}ms delay</p>
      ${!isRead ? `<div class="field"><label>Request Body (JSON)</label>
        <textarea id="test-pipe-data" rows="6" style="font-family:monospace;font-size:11px;width:100%">${bodyPlaceholder}</textarea>
      </div>` : '<p style="color:var(--txt3);font-size:11px;margin-bottom:12px">GET request — no body required.</p>'}
      <div class="modal-actions" style="display:flex;gap:8px">
        <button onclick="UI.closeModal()">Cancel</button>
        <button class="primary" onclick="UI._execTestPipe('${name}')">&#9654; Send</button>
      </div>
      <div id="test-pipe-result" style="margin-top:12px"></div>`);
  },
  _execTestPipe(name) {
    const p = MCE.pipes[name];
    if (!p) return;
    const resultEl = document.getElementById('test-pipe-result');
    if (resultEl) resultEl.innerHTML = `<span style="color:var(--txt3);font-size:11px">Sending ${p.method} ${p.endpoint}…</span>`;
    let promise;
    if (p.method === 'GET') {
      promise = PipeSystem.fetch(name);
    } else {
      let body = {};
      try { body = JSON.parse(document.getElementById('test-pipe-data')?.value || '{}'); } catch(e) { Logger.error('Invalid JSON: ' + e.message); return; }
      promise = PipeSystem.execute(name, body);
    }
    if (promise && promise.then) {
      promise.then(response => {
        if (resultEl) resultEl.innerHTML = `<label>Response</label><textarea rows="8" readonly style="width:100%;font-size:10px;font-family:monospace;background:var(--bg3);color:var(--txt1);border:1px solid var(--brd);padding:6px;border-radius:3px">${JSON.stringify(response, null, 2)}</textarea>`;
      });
    }
  },

      ${loops.map(l => {

          <details style="width:100%"><summary style="font-size:10px;color:var(--txt3);cursor:pointer">template</summary>

        </div>`;
      }).join('')}

    this._refreshLoopBuilder('loop');

  _createLoop() {
    const name = document.getElementById('loop-name').value.trim();
    const pipeName = document.getElementById('loop-pipe').value;
    const targetId = document.getElementById('loop-target').value || null;
    const template = document.getElementById('loop-template').value;
    const desc = document.getElementById('loop-desc').value.trim();
    if (!name) return Logger.error('Loop name required');
    if (!pipeName) return Logger.error('Loop source pipe required');
    LoopSystem.create(name, { pipeName, targetId, template, description: desc });
    document.getElementById('loop-name').value = '';
    document.getElementById('loop-template').value = '';
    document.getElementById('loop-desc').value = '';
  },
  _loopFieldsForPipe(pipeName) {
    const fields = new Set(['_index', '_total']);
    const pipe = MCE.pipes[pipeName];
    if (pipe && Array.isArray(pipe.schema)) pipe.schema.forEach(s => { if (s.key) fields.add(s.key); });
    if (pipe && pipe.collection && DB._store[pipe.collection]) {
      const c = DB._store[pipe.collection];
      const docs = c.isArray ? c.docs : (c.single ? [c.single] : []);
      docs.slice(0, 5).forEach(doc => Object.keys(doc || {}).forEach(k => {
        if (!k.startsWith('_')) fields.add(k);
      }));
    }
    return [...fields];
  },
  _loopToken(field, filter, arg) {
    if (!field) return '';
    let token = '{{' + field;
    if (filter) token += '|' + filter + (arg ? ':' + arg : '');
    return token + '}}';
  },
  _refreshLoopBuilder(prefix) {
    const pipeEl = document.getElementById(prefix === 'edit-loop' ? 'edit-loop-pipe' : 'loop-pipe');
    const fieldEl = document.getElementById(prefix + '-token-field');
    const chipsEl = document.getElementById(prefix + '-field-chips');
    const pipeName = pipeEl ? pipeEl.value : '';
    const fields = this._loopFieldsForPipe(pipeName);
    if (fieldEl) {
      fieldEl.innerHTML = fields.map(f => `<option value="${f}">${f}</option>`).join('');
    }
    if (chipsEl) {
      chipsEl.innerHTML = fields.map(f => `<button class="small" onclick="UI._insertLoopToken('${prefix}','${f}')">{{${f}}}</button>`).join('');
    }
  },
  _insertAtCursor(textarea, text) {
    if (!textarea) return;
    const start = textarea.selectionStart ?? textarea.value.length;
    const end = textarea.selectionEnd ?? textarea.value.length;
    textarea.value = textarea.value.slice(0, start) + text + textarea.value.slice(end);
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = start + text.length;
  },
  _insertLoopToken(prefix, forcedField = '') {
    const tpl = document.getElementById(prefix === 'edit-loop' ? 'edit-loop-template' : 'loop-template');
    const field = forcedField || document.getElementById(prefix + '-token-field')?.value || '';
    const filter = document.getElementById(prefix + '-token-filter')?.value || '';
    const arg = document.getElementById(prefix + '-token-arg')?.value || '';
    this._insertAtCursor(tpl, this._loopToken(field, filter, arg));
  },
  _applyLoopPreset(prefix) {
    const tpl = document.getElementById(prefix === 'edit-loop' ? 'edit-loop-template' : 'loop-template');
    const preset = document.getElementById(prefix + '-preset')?.value || 'list';
    const pipeName = document.getElementById(prefix === 'edit-loop' ? 'edit-loop-pipe' : 'loop-pipe')?.value || '';
    const fields = this._loopFieldsForPipe(pipeName).filter(f => f !== '_index' && f !== '_total');
    const a = fields[0] || 'name';
    const b = fields[1] || 'message';
    const c = fields[2] || 'status';
    const val = f => this._loopToken(f);
    const templates = {
      list: `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #222"><span style="font-size:11px;color:#777;width:24px">{{_index}}</span><strong style="flex:1">${val(a)}</strong><span style="font-size:12px;color:#888">${val(b)}</span></div>`,
      card: `<article style="border:1px solid #222;border-radius:6px;padding:18px;margin-bottom:12px;background:#111"><p style="font-size:11px;color:#777;margin:0 0 8px 0">#{{_index}} of {{_total}}</p><h3 style="margin:0 0 8px 0">${val(a)}</h3><p style="margin:0;color:#aaa;line-height:1.6">${val(b)}</p></article>`,
      compact: `<p style="margin:0 0 8px 0"><strong>{{_index}}.</strong> ${val(a)} <span style="color:#888">${val(b)}</span></p>`,
      'table-row': `<tr><td>{{_index}}</td><td>${val(a)}</td><td>${val(b)}</td><td>${val(c)}</td></tr>`
    };
    if (tpl) tpl.value = templates[preset] || templates.list;
  },
  _testLoop(name) {
    const loop = MCE.loops[name];
    if (!loop) return;
    if (!loop.pipeName) return Logger.error(`Loop "${name}" has no source pipe`);
    const pipe = MCE.pipes[loop.pipeName];
    if (!pipe) return Logger.error(`Pipe "${loop.pipeName}" not found`);
    PipeSystem.fetch(loop.pipeName).then(response => {
      if (response && response.status === 200) {
        const count = Array.isArray(response.data) ? response.data.length : (response.data ? 1 : 0);
        Logger.ok(`Loop "${name}" ran: ${count} document${count !== 1 ? 's' : ''} rendered`);
      }
    });
  },
  _editLoop(name) {
    const loop = MCE.loops[name];

    const getPipes = Object.values(MCE.pipes).filter(p => p.method === 'GET');
    const allMachines = Object.values(MCE.machines);

      <div class="field"><label>Source Pipe</label>
        <select id="edit-loop-pipe" onchange="UI._refreshLoopBuilder('edit-loop')">
          <option value="">-- none --</option>
          ${getPipes.map(p => `<option value="${p.name}" ${p.name === loop.pipeName ? 'selected' : ''}>${p.name} → ${p.endpoint}</option>`).join('')}

      <div class="field"><label>Target Machine</label>
        <select id="edit-loop-target">
          <option value="">-- none --</option>
          ${allMachines.map(m => `<option value="${m.id}" ${m.id === loop.targetId ? 'selected' : ''}>${m.name} &lt;${m.tag}&gt;</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Template Builder</label>
        <div style="border:1px solid var(--brd);border-radius:3px;padding:8px;background:var(--bg2)">
          <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
            <select id="edit-loop-preset" style="flex:1;min-width:110px">
              <option value="list">List Row</option>
              <option value="card">Card</option>
              <option value="compact">Compact Line</option>
              <option value="table-row">Table Row</option>
            </select>
            <button class="small" onclick="UI._applyLoopPreset('edit-loop')">Apply Preset</button>
          </div>
          <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
            <select id="edit-loop-token-field" style="flex:1;min-width:110px"></select>
            <select id="edit-loop-token-filter" style="flex:1;min-width:90px">
              <option value="">No filter</option>
              ${FILTER_NAMES.map(f => `<option>${f}</option>`).join('')}
            </select>
            <input id="edit-loop-token-arg" placeholder="filter arg" style="width:90px">
            <button class="small" onclick="UI._insertLoopToken('edit-loop')">Insert</button>
          </div>
          <div id="edit-loop-field-chips" style="display:flex;gap:4px;flex-wrap:wrap"></div>
        </div>
      </div>
      <div class="field"><label>Template HTML</label>
        <textarea id="edit-loop-template" rows="10" style="font-family:monospace;font-size:11px;width:100%">${loop.template.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      </div>
      <div class="modal-actions" style="display:flex;gap:8px;margin-top:12px">
        <button onclick="UI.closeModal()">Cancel</button>
        <button class="primary" onclick="UI._saveEditLoop('${name}')">Save</button>
      </div>`);
    this._refreshLoopBuilder('edit-loop');
  },
  _saveEditLoop(name) {
    const loop = MCE.loops[name];
    if (!loop) return;
    loop.pipeName = document.getElementById('edit-loop-pipe').value;
    loop.targetId = document.getElementById('edit-loop-target').value || null;
    loop.template = document.getElementById('edit-loop-template').value;
    this.closeModal({ target: document.getElementById('modal-overlay') });
    Logger.ok(`Loop "${name}" updated`);
    UI.renderLoops();
  },

  // ---- VARS PANEL ----
  renderVars() {
    const el = document.getElementById('vars-panel-content');
    if (!el) return;
    const vars = MCE.vars;
    const entries = Object.entries(vars);
    el.innerHTML = `<div style="padding:12px">
      <p style="color:var(--txt3);font-size:11px;line-height:1.6;margin-bottom:10px">Global variables embedded in every export. Access in onclick code as <code style="color:var(--acc1)">MCE_VARS.name</code>. Read transformed output with <code style="color:var(--acc1)">MCE_OUT('M1')</code>.</p>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <input id="new-var-name" placeholder="variable name" style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')UI._addVar()">
        <input id="new-var-value" placeholder="initial value" style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')UI._addVar()">
        <button class="small primary" onclick="UI._addVar()">+</button>
      </div>
      ${!entries.length ? '<div style="color:var(--txt3);font-size:11px;padding:8px;border:1px solid var(--brd2);border-radius:3px">No variables. Add one above.</div>' : ''}
      ${entries.map(([name, v]) => `
        <div style="border:1px solid var(--brd);border-radius:3px;padding:8px;margin-bottom:8px;background:var(--bg2)">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
            <code style="flex:1;font-size:11px;color:var(--acc1)">MCE_VARS.${name}</code>
            <button class="small danger" onclick="UI._deleteVar('${name}')">&#x2715;</button>
          </div>
          <input value="${(v.value||'').replace(/"/g,'&quot;')}" placeholder="value" style="width:100%;margin-bottom:4px;font-size:12px" oninput="MCE.vars['${name}'].value=this.value;UI._syncVarsGlobal()">
          <input value="${(v.desc||'').replace(/"/g,'&quot;')}" placeholder="description" style="width:100%;font-size:11px;color:var(--txt2)" oninput="MCE.vars['${name}'].desc=this.value">
        </div>`).join('')}
    </div>`;
  },
  _setEmitOnInput(id, eventName) {
    const m = MCE.machines[id];
    if (!m) return;
    m.emitOnInput = eventName || '';
    UI.renderInspector();
    UI.renderCanvas();
  },
  _setEmitOnClick(id, eventName) {
    const m = MCE.machines[id];
    if (!m) return;
    m.emitOnClick = eventName || '';
    UI.renderInspector();
    UI.renderCanvas();
  },
  _syncVarsGlobal() {
    window.MCE_VARS = Object.fromEntries(
      Object.entries(MCE.vars || {}).map(([k, v]) => [k, (v && typeof v === 'object') ? String(v.value || '') : String(v || '')])
    );
  },
  _addVar() {
    const nameInp = document.getElementById('new-var-name');
    const valInp  = document.getElementById('new-var-value');
    const name = (nameInp.value || '').trim().replace(/[^a-zA-Z0-9_$]/g, '_');
    if (!name) return Logger.warn('Variable name required');
    if (MCE.vars[name]) return Logger.warn(`Variable "${name}" already exists`);
    MCE.vars[name] = { value: valInp ? valInp.value : '', desc: '' };
    nameInp.value = '';
    if (valInp) valInp.value = '';
    this.renderVars();
    this._syncVarsGlobal();
    Logger.ok(`Global variable "${name}" created`);
  },
  _deleteVar(name) {
    delete MCE.vars[name];
    this.renderVars();
    this._syncVarsGlobal();
    Logger.warn(`Variable "${name}" deleted`);
  },

  // ---- CSS PANEL ----
  renderCSSPanel() {
